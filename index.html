<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- TÍTULO PRINCIPAL (se sobrescribirá en cada página con react-helmet) -->

    <!-- CANONICAL (ajusta la URL base) -->
    <link rel="canonical" href="https://www.advantechai.org/" />

    <!-- OPEN GRAPH (para redes sociales) -->
    <meta property="og:title" content="Advantech AI | Software Empresarial e Inteligencia Artificial" />

    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="Advantech AI" />
